{% extends "base.html" %}
{% block title %}Remover Produto{% endblock %}
{% block page_title %}Remover Produto{% endblock %}
{% block content %}
<div style="max-width:400px">
<div class="card">
<div style="text-align:center;padding:20px">
<div style="font-size:48px;margin-bottom:16px">⚠️</div>
<div class="card-title" style="font-size:18px;margin-bottom:8px">Remover "{{ produto.nome }}"?</div>
<p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">O produto será desativado mas não apagado do histórico de vendas.</p>
<form method="post" style="display:flex;gap:10px;justify-content:center">
{% csrf_token %}
<a href="{% url 'estoque:lista' %}" class="btn btn-secondary">Cancelar</a>
<button type="submit" class="btn btn-danger">Confirmar Remoção</button>
</form>
</div>
</div>
</div>
{% endblock %}
